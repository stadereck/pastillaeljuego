          },
          animation: {
            'spin-fast': 'spin 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  
  <style>
    /* --- CONFIGURACIÓN BASE --- */
    body {
      margin: 0;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    .text-glow {
      text-shadow: 0 0 20px rgba(255,255,255,0.1), 0 0 40px rgba(255,255,255,0.05);
    }
    
    html:not(.dark) .text-glow {
      text-shadow: 0 0 20px rgba(0,0,0,0.05), 0 0 40px rgba(0,0,0,0.02);
    }

    /* --- LÓGICA DEL DOCK DE MAC OS --- */
    .dock-wrapper {
      perspective: 1000px;
    }

    .dock-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: 180px;
      padding: 0 20px;
      /* Scroll suave en móviles */
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .dock-container::-webkit-scrollbar { display: none; }

    .sphere {
      flex-shrink: 0;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      scroll-snap-align: center;
      box-shadow: 
        inset -12px -12px 20px rgba(0, 0, 0, 0.8),
        inset 8px 8px 15px rgba(255, 255, 255, 0.3),
        inset 0px 0px 5px rgba(255, 255, 255, 0.2),
        0 10px 15px rgba(0,0,0,0.4);
      /* Curva bezier al estilo Apple para máxima fluidez */
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15);
      cursor: pointer;
      outline: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      border: 1px solid transparent;
      will-change: width, height, transform, box-shadow;
    }

    /* Focus state for accessibility */
    .sphere:focus-visible {
      border-color: #3cdcc1;
      box-shadow: 0 0 0 3px rgba(60, 220, 193, 0.4);
    }

    /* 1. Esfera Principal (Hover/Focus) */
    .sphere:hover,
    .sphere:focus {
      width: 140px;
      height: 140px;
      transform: translateY(-10px);
      box-shadow: 
        inset -12px -12px 20px rgba(0, 0, 0, 0.8),
        inset 8px 8px 15px rgba(255, 255, 255, 0.4),
        inset 0px 0px 5px rgba(255, 255, 255, 0.3),
        0 25px 35px rgba(0,0,0,0.6);
      z-index: 10;
    }

    /* 2. Esfera DERECHA Inmediata */
    .sphere:hover + .sphere,
    .sphere:focus + .sphere {
      width: 90px;
      height: 90px;
      transform: translateY(-5px);
      z-index: 5;
    }

    /* 3. Esfera IZQUIERDA Inmediata (Con :has) */
    .dock-container:has(> .sphere:hover) .sphere:has(+ .sphere:hover),
    .dock-container:has(> .sphere:focus) .sphere:has(+ .sphere:focus) {
      width: 90px;
      height: 90px;
      transform: translateY(-5px);
      z-index: 5;
    }

    /* Contenido Interno (Aparece suavemente) */
    .sphere-content {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      pointer-events: none;
    }

    .sphere:hover .sphere-content,
    .sphere:focus .sphere-content {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.1s;
    }

    .sphere-number {
      font-size: 0.75rem;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 6px auto;
      font-family: 'Inter', sans-serif;
    }

    .sphere-name {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* --- TEXTURAS Y PLANETAS (Generación Procedural CSS) --- */
    .sphere-1 { background: linear-gradient(135deg, #e67e22 0%, #d35400 50%, rgba(142,68,173,0.8) 100%), repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px); background-blend-mode: overlay; }
    .sphere-2 { background: linear-gradient(110deg, transparent 40%, rgba(231,76,60,0.8) 42%, rgba(231,76,60,0.8) 58%, transparent 60%), linear-gradient(-70deg, transparent 30%, rgba(26,188,156,0.6) 32%, rgba(26,188,156,0.6) 48%, transparent 50%), radial-gradient(circle at 30% 30%, #2c3e50, #1a252f); }
    .sphere-3 { background: linear-gradient(125deg, transparent 35%, rgba(211,84,0,0.9) 37%, rgba(211,84,0,0.9) 63%, transparent 65%), radial-gradient(circle at 40% 40%, #16a085, #0b4e41); }
    .sphere-4 { background: linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.1) 50%, transparent 52%), linear-gradient(-45deg, transparent 48%, rgba(255,255,255,0.1) 50%, transparent 52%), radial-gradient(circle at 35% 35%, #7f8c8d, #2c3e50, #000); }
    .sphere-5 { background: radial-gradient(circle at 20% 30%, rgba(26,188,156,0.5) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(241,196,15,0.2) 0%, transparent 40%), linear-gradient(135deg, #34495e, #111); }
    .sphere-6 { background: radial-gradient(ellipse at 40% 30%, #e74c3c 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, #c0392b 0%, transparent 60%), linear-gradient(45deg, #8e44ad, #c0392b); }
    .sphere-7 { background: linear-gradient(95deg, transparent 45%, rgba(41,128,185,0.7) 48%, rgba(41,128,185,0.7) 52%, transparent 55%), radial-gradient(circle at 30% 30%, #8e8055, #4a4128); }
    .sphere-8 { background: linear-gradient(160deg, #fdfbfb 0%, #ebedee 40%, rgba(231,76,60,0.8) 100%); }
    .sphere-9 { background: radial-gradient(circle at 50% 50%, #2980b9, #8e44ad, #2c3e50); }

    /* --- ANIMACIONES DE FONDO --- */
    .bg-line {
      transition: stroke 1s ease;
      animation: floatLine 10s ease-in-out infinite alternate;
      transform-origin: center;
      will-change: transform; /* Optimización GPU */
    }
    
    .bg-line:nth-child(1) { animation-duration: 12s; }
    .bg-line:nth-child(2) { animation-duration: 15s; animation-delay: -4s; }
    .bg-line:nth-child(3) { animation-duration: 18s; animation-delay: -8s; }
    .bg-line:nth-child(4) { animation-duration: 13s; animation-delay: -6s; }

    @keyframes floatLine {
      0% { transform: translate(-3%, -5%) scale(1); }
      100% { transform: translate(3%, 5%) scale(1.08); }
    }

    /* --- ANIMACIONES DE VOLUMEN --- */
    .wave { opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; transform-origin: left; }
    .mute-line { opacity: 0; transition: opacity 0.3s ease; stroke-dasharray: 30; stroke-dashoffset: 30; }
    
    .vol-silencio .mute-line { opacity: 1; stroke: #ef4444; stroke-dashoffset: 0; transition: stroke-dashoffset 0.4s ease-out; }
    .vol-bajo .wave-1 { opacity: 1; animation: volPulse 1.5s infinite ease-in-out; }
    .vol-medio .wave-1 { opacity: 1; }
    .vol-medio .wave-2 { opacity: 1; animation: volPulse 1.5s infinite ease-in-out 0.2s; }
    .vol-alto .wave-1, .vol-alto .wave-2 { opacity: 1; }
    .vol-alto .wave-3 { opacity: 1; animation: volPulse 1.5s infinite ease-in-out 0.4s; }
    
    @keyframes volPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(0.9); }
      50% { opacity: 1; transform: scaleY(1.1); }
    }

    /* --- ESTILOS DE COMPONENTES INTERACTIVOS --- */
    .glass-panel {
      background: rgba(26, 35, 39, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }
    
    html:not(.dark) .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(0, 0, 0, 0.05);
    }

    /* Ocultar cursor falso realísticamente */
    .typing-cursor::after {
      content: '|';
      animation: blink 1s step-end infinite;
      color: inherit;
      opacity: 0.8;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .hide-cursor::after { display: none; }
  </style>
</head>

          "https://framerusercontent.com/images/uX8CQWBIMOZ93Hfua8tMIE3XPk.png?scale-down-to=512",
          "https://framerusercontent.com/images/c1vetV29vyhQ7txOokbtTVzLkc.png?scale-down-to=512",
          "https://framerusercontent.com/images/12fi293AgQ6WKkdnL56q9zXruaM.png?scale-down-to=512",
          "https://framerusercontent.com/images/Flopgw7cAgiTwDJ8X40tO3u6c.png?scale-down-to=512",
          "https://framerusercontent.com/images/g2iRJtGwdgJtbea9zINzAFxMY.png?scale-down-to=512"
        ];
        const randomLogo = logoImages[Math.floor(Math.random() * logoImages.length)];
        
        document.getElementById('dynamicLogo').style.backgroundImage = `url('${randomLogo}')`;
        const favicon = document.getElementById('dynamicFavicon');
        if (favicon) favicon.href = randomLogo;
      };

      // ==========================================
      // 2. GESTOR DE TEMA (MODO CLARO/OSCURO TIPO TAILWIND)
      // ==========================================
      const ThemeManager = (() => {
        const htmlElement = document.documentElement;
        const themeBtns = document.querySelectorAll('.theme-btn');
        let currentTheme = localStorage.getItem('pastilla_theme') || 'device';

        const applyActiveStyle = (themeValue) => {
          themeBtns.forEach(btn => {
            if(btn.dataset.theme === themeValue) {
              btn.classList.add('bg-white', 'dark:bg-[#1a2327]', 'text-brand', 'shadow-sm', 'dark:text-brand');
              btn.classList.remove('text-slate-500', 'dark:text-white/40');
            } else {
              btn.classList.remove('bg-white', 'dark:bg-[#1a2327]', 'text-brand', 'shadow-sm', 'dark:text-brand');
              btn.classList.add('text-slate-500', 'dark:text-white/40');
            }
          });
        };

        const applyTheme = (themeStr) => {
          currentTheme = themeStr;
          localStorage.setItem('pastilla_theme', themeStr);
          applyActiveStyle(themeStr);

          if (themeStr === 'dark') {
            htmlElement.classList.add('dark');
          } else if (themeStr === 'light') {
            htmlElement.classList.remove('dark');
          } else {
            // Modo Dispositivo (Sistema)
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            htmlElement.classList.toggle('dark', prefersDark);
          }
        };

        // Listeners
        themeBtns.forEach(btn => {
          btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
        });

        // Escuchar cambios a nivel SO
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
          if (currentTheme === 'device') htmlElement.classList.toggle('dark', e.matches);
        });

        return { init: () => applyTheme(currentTheme) };
      })();

      // ==========================================
      // 3. GESTOR DE INPUT Y DADO (EFECTO TYPEWRITER)
      // ==========================================
      const InputManager = (() => {
        const input = document.getElementById('usernameInput');
        const btnRandom = document.getElementById('btnRandomName');
        const inputWrapper = document.getElementById('inputWrapper');
        
        const randomNames = ["AstroViajero", "CosmicRider", "NovaDust", "LunaByte", "QuantumPilot", "GalacticNomad", "VoidSurfer", "ZenithSeeker", "CiberPlaneta", "StellarEcho"];
        
        let typingTimeout;

        const init = () => {
          input.value = localStorage.getItem('pastilla_name') || '';
          
          input.addEventListener('input', (e) => {
            localStorage.setItem('pastilla_name', e.target.value);
          });

          btnRandom.addEventListener('click', generateRandomName);
        };

        // Efecto realista de escritura
        const typeText = (text, index = 0) => {
          if (index === 0) {
            input.value = '';
            input.classList.add('typing-cursor');
          }
          
          if (index < text.length) {
            input.value += text.charAt(index);
            localStorage.setItem('pastilla_name', input.value);
            // Velocidad aleatoria para simular humanidad (30ms a 100ms)
            const delay = Math.random() * 70 + 30; 
            typingTimeout = setTimeout(() => typeText(text, index + 1), delay);
          } else {
            input.classList.remove('typing-cursor');
            // Feedback visual al terminar
            inputWrapper.classList.add('scale-[1.02]');
            setTimeout(() => inputWrapper.classList.remove('scale-[1.02]'), 150);
          }
        };

        const generateRandomName = () => {
          clearTimeout(typingTimeout);
          input.classList.remove('typing-cursor');
          
          const newName = randomNames[Math.floor(Math.random() * randomNames.length)];
          typeText(newName);
        };

        return { init };
      })();

      // ==========================================
      // 4. GESTOR DE AVATAR (DOCK)
      // ==========================================
      const AvatarManager = (() => {
        const currentAvatarUI = document.getElementById('currentAvatar');
        const dockContainer = document.querySelector('.dock-container');
        const spheres = document.querySelectorAll('.sphere');

        const setAvatar = (sphereClass) => {
          // Extraemos solo la clase 'sphere-X' base
          const cleanClass = sphereClass.match(/sphere-\d+/)[0];
          
          // Actualizamos visuales
          currentAvatarUI.className = `w-6 h-6 rounded-full shadow-[inset_-4px_-4px_6px_rgba(0,0,0,0.8),inset_2px_2px_4px_rgba(255,255,255,0.3)] transition-all duration-500 ${cleanClass}`;
          localStorage.setItem('pastilla_avatar', cleanClass);
          
          // Accesibilidad: marcar radio button
          spheres.forEach(s => {
            const isSelected = s.classList.contains(cleanClass);
            s.setAttribute('aria-checked', isSelected);
          });
        };

        const init = () => {
          const savedAvatar = localStorage.getItem('pastilla_avatar') || 'sphere-6';
          setAvatar(savedAvatar);

          // Event Delegation para mejor rendimiento
          dockContainer.addEventListener('click', (e) => {
            const sphereBtn = e.target.closest('.sphere');
            if (!sphereBtn) return;
            
            const classArray = Array.from(sphereBtn.classList);
            const targetClass = classArray.find(c => c.startsWith('sphere-'));
            if (targetClass) setAvatar(targetClass);
          });
        };

        return { init };
      })();

      // ==========================================
      // 5. GESTOR DE AUDIO INTELIGENTE
      // ==========================================
      const AudioManager = (() => {
        const bgMusic = document.getElementById('bgMusic');
        const btnVolume = document.getElementById('btnVolume');
        const volIcon = document.getElementById('volIcon');
        
        let volLevel = parseInt(localStorage.getItem('pastilla_vol_level')) || 2; 
        const volLevels = [0, 0.3, 0.6, 1.0];
        const volClasses = ['vol-silencio', 'vol-bajo', 'vol-medio', 'vol-alto'];

        const setVolume = (level) => {
          bgMusic.volume = volLevels[level];
          volIcon.className = `text-slate-600 dark:text-white group-hover:text-brand transition-colors ${volClasses[level]}`;
          localStorage.setItem('pastilla_vol_level', level);
        };

        const init = () => {
          setVolume(volLevel);

          btnVolume.addEventListener('click', (e) => {
            e.stopPropagation();
            volLevel = (volLevel + 1) % 4;
            setVolume(volLevel);
            if (volLevel > 0 && bgMusic.paused) bgMusic.play().catch(() => {});
          });

          // Play inteligente (requiere interacción del usuario según navegadores modernos)
          const startAudio = () => {
            if (volLevel > 0 && bgMusic.paused) bgMusic.play().catch(() => {});
            document.removeEventListener('click', startAudio);
            document.removeEventListener('keydown', startAudio);
          };

          if (volLevel > 0) {
            bgMusic.play().catch(() => {
              document.addEventListener('click', startAudio, { once: true });
              document.addEventListener('keydown', startAudio, { once: true });
            });
          }
        };

        return { init };
      })();

      // INICIALIZACIÓN GENERAL
      initBrandAssets();
      ThemeManager.init();
      InputManager.init();
      AvatarManager.init();
      AudioManager.init();

    });
  </script>
</body>
</html>
