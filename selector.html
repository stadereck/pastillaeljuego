<head>

  <!-- Tailwind CSS por CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');

    body {
      margin: 0;
      background-color: #071012;
      font-family: 'Cormorant Garamond', serif;
      /* Elimina el resalte azul nativo de los navegadores móviles al tocar */
      -webkit-tap-highlight-color: transparent;
    }

    .text-glow {
      text-shadow: 0 0 20px rgba(255,255,255,0.1), 0 0 40px rgba(255,255,255,0.05);
    }

    /* --- Lógica del Dock de macOS --- */
    .dock-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 180px; /* Espacio para que crezcan sin desplazar el resto del layout */
    }

    .sphere {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 
        inset -12px -12px 20px rgba(0, 0, 0, 0.8),
        inset 8px 8px 15px rgba(255, 255, 255, 0.3),
        inset 0px 0px 5px rgba(255, 255, 255, 0.2),
        0 10px 15px rgba(0,0,0,0.6);
      /* Transición suave para todos los cambios de tamaño, simulando la fluidez del Mac */
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      cursor: pointer;
      outline: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
    }

    /* 1. Esfera Principal (La que tiene el cursor / dedo encima) */
    .sphere:hover,
    .sphere:focus,
    .sphere:active {
      width: 150px;
      height: 150px;
      box-shadow: 
        inset -12px -12px 20px rgba(0, 0, 0, 0.8),
        inset 8px 8px 15px rgba(255, 255, 255, 0.4),
        inset 0px 0px 5px rgba(255, 255, 255, 0.3),
        0 25px 35px rgba(0,0,0,0.8);
      z-index: 10;
    }

    /* 2. Esfera DERECHA Inmediata (Hermano siguiente) */
    .sphere:hover + .sphere,
    .sphere:focus + .sphere {
      width: 95px;
      height: 95px;
      z-index: 5;
    }

    /* 3. Esfera IZQUIERDA Inmediata (Hermano anterior - Magia de CSS moderno con :has) */
    .dock-container:has(> .sphere:hover) .sphere:has(+ .sphere:hover),
    .dock-container:has(> .sphere:focus) .sphere:has(+ .sphere:focus),
    .dock-container:has(> .sphere:active) .sphere:has(+ .sphere:active) {
      width: 95px;
      height: 95px;
      z-index: 5;
    }

    /* Contenido interno de la esfera (Número y Nombre) */
    .sphere-content {
      opacity: 0;
      transition: opacity 0.2s ease;
      text-align: center;
      pointer-events: none;
    }

    .sphere:hover .sphere-content,
    .sphere:focus .sphere-content,
    .sphere:active .sphere-content {
      opacity: 1;
      transition-delay: 0.1s; /* Retraso para que el texto aparezca solo cuando ya es grande */
    }

    .sphere-number {
      font-size: 0.8rem;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 4px auto;
      font-family: sans-serif;
    }

    .sphere-name {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Mini esfera para el contenedor del input */
    .mini-sphere {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      box-shadow: inset -4px -4px 6px rgba(0,0,0,0.8), inset 2px 2px 4px rgba(255,255,255,0.3);
    }

    /* Ocultar barra de scroll en móviles */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    /* --- Texturas y Gradientes de cada Esfera --- */
    .sphere-1 {
      background: linear-gradient(135deg, rgba(230,126,34,1) 0%, rgba(211,84,0,1) 50%, rgba(142,68,173,0.8) 100%),
                  repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
      background-blend-mode: overlay;
    }

    .sphere-2 {
      background: 
        linear-gradient(110deg, transparent 40%, rgba(231,76,60,0.8) 42%, rgba(231,76,60,0.8) 58%, transparent 60%),
        linear-gradient(-70deg, transparent 30%, rgba(26,188,156,0.6) 32%, rgba(26,188,156,0.6) 48%, transparent 50%),
        radial-gradient(circle at 30% 30%, #2c3e50, #1a252f);
    }

    .sphere-3 {
      background: 
        linear-gradient(125deg, transparent 35%, rgba(211,84,0,0.9) 37%, rgba(211,84,0,0.9) 63%, transparent 65%),
        radial-gradient(circle at 40% 40%, #16a085, #0b4e41);
    }

    .sphere-4 {
      background: 
        linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.1) 50%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, rgba(255,255,255,0.1) 50%, transparent 52%),
        radial-gradient(circle at 35% 35%, #7f8c8d, #2c3e50, #000);
    }

    .sphere-5 {
      background: 
        radial-gradient(circle at 20% 30%, rgba(26,188,156,0.5) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(241,196,15,0.2) 0%, transparent 40%),
        linear-gradient(135deg, #34495e, #111);
    }

    .sphere-6 {
      background: 
        radial-gradient(ellipse at 40% 30%, #e74c3c 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, #c0392b 0%, transparent 60%),
        linear-gradient(45deg, #8e44ad, #c0392b);
    }

    .sphere-7 {
      background: 
        linear-gradient(95deg, transparent 45%, rgba(41,128,185,0.7) 48%, rgba(41,128,185,0.7) 52%, transparent 55%),
        radial-gradient(circle at 30% 30%, #8e8055, #4a4128);
    }

    .sphere-8 {
      background: 
        linear-gradient(160deg, #fdfbfb 0%, #ebedee 40%, rgba(231,76,60,0.8) 100%);
    }

    @media (max-width: 768px) {
      .sphere {
        width: 50px;
        height: 50px;
      }
    }

    /* --- ESTILOS Y ANIMACIONES DEL VOLUMEN --- */
    .wave { opacity: 0; transition: opacity 0.3s ease; transform-origin: center; }
    .mute-line { opacity: 0; transition: opacity 0.3s ease; }
    
    /* Estado: Silencio */
    .vol-silencio .mute-line { opacity: 1; stroke: #ff4d4d; }
    
    /* Estado: Bajo */
    .vol-bajo .wave-1 { opacity: 1; animation: volPulse 1.5s infinite ease-in-out; }
    
    /* Estado: Medio */
    .vol-medio .wave-1 { opacity: 1; }
    .vol-medio .wave-2 { opacity: 1; animation: volPulse 1.5s infinite ease-in-out 0.2s; }
    
    /* Estado: Alto */
    .vol-alto .wave-1 { opacity: 1; }
    .vol-alto .wave-2 { opacity: 1; }
    .vol-alto .wave-3 { opacity: 1; animation: volPulse 1.5s infinite ease-in-out 0.4s; }
    
    @keyframes volPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* --- Animación de Líneas de Fondo --- */
    .bg-line {
      stroke: rgba(255, 255, 255, 0.25); /* Color blanco en modo oscuro (por defecto) */
      transition: stroke 1s ease; /* Transición suave de color al cambiar de tema */
      animation: floatLine 10s ease-in-out infinite alternate;
      transform-origin: center;
    }
    
    /* Desfasar las animaciones para que se muevan de forma orgánica e independiente */
    .bg-line:nth-child(1) { animation-duration: 12s; }
    .bg-line:nth-child(2) { animation-duration: 15s; animation-delay: -4s; }
    .bg-line:nth-child(3) { animation-duration: 18s; animation-delay: -8s; }
    .bg-line:nth-child(4) { animation-duration: 13s; animation-delay: -6s; }

    @keyframes floatLine {
      0% { transform: translate(-3%, -5%) scale(1); }
      100% { transform: translate(3%, 5%) scale(1.08); } /* Movimiento mucho más notorio */
    }

    /* --- ESTILOS PARA EL MODO CLARO --- */
    body.light-theme {
      background-color: #e2e8f0;
      color: #0f172a;
    }
    body.light-theme .bg-gradient-to-br {
      background-image: linear-gradient(to bottom right, #f8fafc, #e2e8f0, #cbd5e1);
    }
    body.light-theme .text-white { color: #0f172a; }
    body.light-theme .text-white\/60, body.light-theme .text-white\/50 { color: rgba(15, 23, 42, 0.6); }
    body.light-theme .text-white\/90 { color: rgba(15, 23, 42, 0.9); }
    body.light-theme .text-glow {
      text-shadow: 0 0 20px rgba(0,0,0,0.1), 0 0 40px rgba(0,0,0,0.05);
    }
    /* Adaptando el glassmorphism al modo claro */
    body.light-theme .bg-\[\#1a2327\]\/60 { background-color: rgba(255, 255, 255, 0.6); }
    body.light-theme .border-white\/20, body.light-theme .border-white\/5 { border-color: rgba(0, 0, 0, 0.1); }
    body.light-theme .bg-black\/40 { background-color: rgba(255, 255, 255, 0.5); }
    body.light-theme .bg-black\/30 { background-color: rgba(255, 255, 255, 0.6); }
    body.light-theme .hover\:bg-black\/50:hover { background-color: rgba(255, 255, 255, 0.9); }
    body.light-theme .placeholder-white\/30::placeholder { color: rgba(15, 23, 42, 0.4); }
    
    /* Botones de tema (Estado Activo) */
    .theme-btn { transition: all 0.3s ease; }
    .theme-btn.active {
      background-color: #2a3c42;
      color: #3cdcc1;

    }
    body.light-theme .theme-btn.active {
      background-color: #ffffff;
      color: #0ea5e9;
      border-color: rgba(0, 0, 0, 0.1);
    }

    /* Líneas en modo claro */
    body.light-theme .bg-line {
      stroke: rgba(15, 23, 42, 0.15); /* Oscuro sutil en modo claro */
    }
  </style>
</head>

        "https://framerusercontent.com/images/c1vetV29vyhQ7txOokbtTVzLkc.png?scale-down-to=512&width=522&height=522",
        "https://framerusercontent.com/images/12fi293AgQ6WKkdnL56q9zXruaM.png?scale-down-to=512&width=522&height=522",
        "https://framerusercontent.com/images/Flopgw7cAgiTwDJ8X40tO3u6c.png?scale-down-to=512&width=522&height=522",
        "https://framerusercontent.com/images/g2iRJtGwdgJtbea9zINzAFxMY.png?scale-down-to=512&width=522&height=522",
        "https://framerusercontent.com/images/yesr9xV0cohCNzq1NOl5n0UqT8.png?scale-down-to=512&width=522&height=522",
        "https://framerusercontent.com/images/oZesYcadl5czhvenyFIbWNsnN0.png?scale-down-to=512&width=522&height=522",
        "https://framerusercontent.com/images/ee04zdoMlDjOV1nw5EiDNvX9Tc.png?scale-down-to=512&width=522&height=522"
      ];

      // Seleccionar una imagen aleatoria de la lista
      const randomLogoImage = logoImages[Math.floor(Math.random() * logoImages.length)];

      // Aplicar al logo en la barra superior
      dynamicLogo.style.backgroundImage = `url('${randomLogoImage}')`;
      dynamicLogo.style.backgroundSize = 'cover';
      dynamicLogo.style.backgroundPosition = 'center';

      // Aplicar al favicon en la pestaña del navegador
      if (dynamicFavicon) {
        dynamicFavicon.href = randomLogoImage;
      }

      // 1. Cargar datos guardados (o valores por defecto)
      let savedName = localStorage.getItem('pastilla_name') || '';
      let savedAvatar = localStorage.getItem('pastilla_avatar') || 'sphere-6';
      let savedTheme = localStorage.getItem('pastilla_theme') || 'device';

      // -- LÓGICA DEL NOMBRE --
      input.value = savedName;
      
      const updateCursor = () => {
        // Oculta el cursor falso si hay texto escrito
        fakeCursor.style.display = input.value.length > 0 ? 'none' : 'block';
      };
      
      input.addEventListener('input', (e) => {
        localStorage.setItem('pastilla_name', e.target.value);
        updateCursor();
      });
      updateCursor(); // Inicializar estado del cursor

      // -- LÓGICA DEL DADO ALEATORIO --
      const btnRandomName = document.getElementById('btnRandomName');
      const inputContainer = input.closest('.relative');
      
      const randomUsernames = [
        "AstroViajero", "CosmicRider", "NovaDust", "NebulaWalker",
        "LunaByte", "QuantumPilot", "GalacticNomad", "StarForge",
        "VoidSurfer", "ZenithSeeker", "MeteorDash", "SolarFlare",
        "OrbitJumper", "AuroraHunter", "CiberPlaneta", "StellarEcho"
      ];

      btnRandomName.addEventListener('click', () => {
        // Animación del dado rotando
        btnRandomName.style.transform = 'rotate(180deg) scale(1.05)';
        setTimeout(() => btnRandomName.style.transform = '', 300);

        // Asignar nombre aleatorio espacial
        const randomName = randomUsernames[Math.floor(Math.random() * randomUsernames.length)];
        input.value = randomName;
        localStorage.setItem('pastilla_name', randomName);
        updateCursor();

        // Animación de pulso (zoom) en el input para confirmar visualmente
        inputContainer.classList.add('scale-[1.02]');
        setTimeout(() => inputContainer.classList.remove('scale-[1.02]'), 200);
      });

      // -- LÓGICA DEL AVATAR --
      const setAvatar = (className) => {
        currentAvatar.className = `mini-sphere ${className}`;
        localStorage.setItem('pastilla_avatar', className);
      };
      setAvatar(savedAvatar);

      dockSpheres.forEach(sphere => {
        sphere.addEventListener('click', () => {
          // Extrae la clase específica 'sphere-X' del planeta clickeado
          const sphereClass = Array.from(sphere.classList).find(c => c.startsWith('sphere-') && !c.includes('content'));
          if (sphereClass) setAvatar(sphereClass);
        });
      });

      // -- LÓGICA DEL TEMA --
      const applyTheme = (themeStr) => {
        localStorage.setItem('pastilla_theme', themeStr);
        
        // Quitar estado activo de todos los botones
        Object.values(themeButtons).forEach(btn => btn.classList.remove('active'));
        
        // Poner estado activo al botón seleccionado
        if(themeButtons[themeStr]) {
          themeButtons[themeStr].classList.add('active');
        }

        // Aplicar el tema al body
        if (themeStr === 'light') {
          document.body.classList.add('light-theme');
        } else if (themeStr === 'dark') {
          document.body.classList.remove('light-theme');
        } else if (themeStr === 'device') {
          // Detectar preferencia del sistema
          const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          if (prefersLight) {
            document.body.classList.add('light-theme');
          } else {
            document.body.classList.remove('light-theme');
          }
        }
      };

      // Inicializar tema guardado
      applyTheme(savedTheme);

      // Event Listeners para los botones de tema
      btnLight.addEventListener('click', () => applyTheme('light'));
      btnDark.addEventListener('click', () => applyTheme('dark'));
      btnDevice.addEventListener('click', () => applyTheme('device'));

      // Escuchar si el usuario cambia el tema desde el sistema operativo (Si está en modo Dispositivo)
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if(localStorage.getItem('pastilla_theme') === 'device') {
          applyTheme('device');
        }
      });

      // -- LÓGICA DEL REPRODUCTOR DE MÚSICA --
      const bgMusic = document.getElementById('bgMusic');
      const btnVolume = document.getElementById('btnVolume');
      const volIcon = document.getElementById('volIcon');

      // Niveles de volumen: 0 (Silencio), 1 (Bajo), 2 (Medio), 3 (Alto)
      let currentVolLevel = parseInt(localStorage.getItem('pastilla_vol_level')) || 2; 
      const volumeValues = [0, 0.3, 0.6, 1.0];
      const volClasses = ['vol-silencio', 'vol-bajo', 'vol-medio', 'vol-alto'];

      const applyVolume = (level) => {
        bgMusic.volume = volumeValues[level];
        volIcon.className = volClasses[level];
        localStorage.setItem('pastilla_vol_level', level);
      };

      // Inicializar volumen
      applyVolume(currentVolLevel);

      // Cambiar volumen al hacer clic en el botón superior derecho
      btnVolume.addEventListener('click', (e) => {
        e.stopPropagation(); // Evitar que el clic cuente como interacción general para el autoplay
        currentVolLevel = (currentVolLevel + 1) % 4; // Ciclar: 0 -> 1 -> 2 -> 3 -> 0
        applyVolume(currentVolLevel);
        
        // Si no estaba silenciado y está pausado, reprodúcelo
        if (currentVolLevel > 0 && bgMusic.paused) {
          bgMusic.play().catch(console.error);
        }
      });

      // Manejar el Autoplay Inteligente
      const startAudio = () => {
        if (currentVolLevel > 0 && bgMusic.paused) {
          bgMusic.play().catch(console.error);
        }
        // Quitar el listener una vez que ya interactuó
        document.removeEventListener('click', startAudio);
        document.removeEventListener('keydown', startAudio);
      };

      // Intentar reproducir automáticamente (el navegador puede bloquearlo)
      if (currentVolLevel > 0) {
        bgMusic.play().catch(() => {
          // Si el navegador lo bloqueó por políticas de Autoplay, espera a la primera interacción
          document.addEventListener('click', startAudio);
          document.addEventListener('keydown', startAudio);
        });
      }

    });
  </script>
</body>
</html>
